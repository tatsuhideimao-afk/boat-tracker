<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <rect width="192" height="192" rx="36" fill="#0ea5c8"/>
  <!-- flag pole -->
  <rect x="36" y="30" width="8" height="132" rx="4" fill="rgba(255,255,255,0.88)"/>
  <rect x="28" y="154" width="24" height="8" rx="4" fill="rgba(255,255,255,0.65)"/>
  <!-- checkered flag 7×5 grid clipped to flag shape -->
  <g transform="translate(44,30)">
    <clipPath id="c"><rect width="112" height="80" rx="3"/></clipPath>
    <g clip-path="url(#c)">
      <rect x="0"  y="0"  width="16" height="16" fill="#1e293b"/>
      <rect x="16" y="0"  width="16" height="16" fill="white"/>
      <rect x="32" y="0"  width="16" height="16" fill="#1e293b"/>
      <rect x="48" y="0"  width="16" height="16" fill="white"/>
      <rect x="64" y="0"  width="16" height="16" fill="#1e293b"/>
      <rect x="80" y="0"  width="16" height="16" fill="white"/>
      <rect x="96" y="0"  width="16" height="16" fill="#1e293b"/>
      <rect x="0"  y="16" width="16" height="16" fill="white"/>
      <rect x="16" y="16" width="16" height="16" fill="#1e293b"/>
      <rect x="32" y="16" width="16" height="16" fill="white"/>
      <rect x="48" y="16" width="16" height="16" fill="#1e293b"/>
      <rect x="64" y="16" width="16" height="16" fill="white"/>
      <rect x="80" y="16" width="16" height="16" fill="#1e293b"/>
      <rect x="96" y="16" width="16" height="16" fill="white"/>
      <rect x="0"  y="32" width="16" height="16" fill="#1e293b"/>
      <rect x="16" y="32" width="16" height="16" fill="white"/>
      <rect x="32" y="32" width="16" height="16" fill="#1e293b"/>
      <rect x="48" y="32" width="16" height="16" fill="white"/>
      <rect x="64" y="32" width="16" height="16" fill="#1e293b"/>
      <rect x="80" y="32" width="16" height="16" fill="white"/>
      <rect x="96" y="32" width="16" height="16" fill="#1e293b"/>
      <rect x="0"  y="48" width="16" height="16" fill="white"/>
      <rect x="16" y="48" width="16" height="16" fill="#1e293b"/>
      <rect x="32" y="48" width="16" height="16" fill="white"/>
      <rect x="48" y="48" width="16" height="16" fill="#1e293b"/>
      <rect x="64" y="48" width="16" height="16" fill="white"/>
      <rect x="80" y="48" width="16" height="16" fill="#1e293b"/>
      <rect x="96" y="48" width="16" height="16" fill="white"/>
      <rect x="0"  y="64" width="16" height="16" fill="#1e293b"/>
      <rect x="16" y="64" width="16" height="16" fill="white"/>
      <rect x="32" y="64" width="16" height="16" fill="#1e293b"/>
      <rect x="48" y="64" width="16" height="16" fill="white"/>
      <rect x="64" y="64" width="16" height="16" fill="#1e293b"/>
      <rect x="80" y="64" width="16" height="16" fill="white"/>
      <rect x="96" y="64" width="16" height="16" fill="#1e293b"/>
    </g>
  </g>
  <!-- ¥ mark bottom right -->
  <text x="148" y="174" text-anchor="middle" font-size="42" font-weight="700"
    fill="rgba(255,255,255,0.85)" font-family="-apple-system,sans-serif">¥</text>
